<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Integra Trade - Plataforma de Ejecución en Punto de Venta</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --navy: #0F172A;
      --navy-mid: #1E293B;
      --navy-light: #334155;
      --gold: #F59E0B;
      --gold-dark: #D97706;
      --blue: #3B82F6;
      --green: #22C55E;
      --red: #EF4444;
      --slate-100: #F1F5F9;
      --slate-200: #E2E8F0;
      --slate-400: #94A3B8;
      --slate-500: #64748B;
      --white: #FFFFFF;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--slate-100);
      color: var(--navy);
      min-height: 100vh;
    }

    /* ---- AUTH SCREENS ---- */
    #auth-screen {
      min-height: 100vh;
      background: linear-gradient(135deg, var(--navy) 0%, #1a2744 60%, #0d2348 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .auth-card {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px;
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 25px 50px rgba(0,0,0,0.4);
    }

    .brand-logo {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
    }

    .brand-logo svg { filter: drop-shadow(0 4px 16px rgba(245,158,11,0.4)); }

    .brand-title {
      font-size: 28px;
      font-weight: 900;
      letter-spacing: 3px;
      color: var(--white);
    }

    .brand-title span { color: var(--gold); }

    .brand-tagline {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1.5px;
      color: rgba(255,255,255,0.5);
      text-transform: uppercase;
      text-align: center;
    }

    .form-group { margin-bottom: 20px; }

    .form-label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: rgba(255,255,255,0.6);
      margin-bottom: 8px;
      letter-spacing: 0.5px;
    }

    .form-input {
      width: 100%;
      padding: 14px 16px;
      background: rgba(255,255,255,0.08);
      border: 1.5px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      color: var(--white);
      font-family: 'Outfit', sans-serif;
      font-size: 15px;
      transition: all 0.2s;
      outline: none;
    }

    .form-input::placeholder { color: rgba(255,255,255,0.3); }

    .form-input:focus {
      border-color: var(--gold);
      background: rgba(245,158,11,0.08);
      box-shadow: 0 0 0 3px rgba(245,158,11,0.15);
    }

    .btn-primary {
      width: 100%;
      padding: 16px;
      background: var(--gold);
      color: var(--navy);
      border: none;
      border-radius: 12px;
      font-family: 'Outfit', sans-serif;
      font-size: 16px;
      font-weight: 800;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 8px;
    }

    .btn-primary:hover {
      background: var(--gold-dark);
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(245,158,11,0.4);
    }

    .btn-primary:active { transform: translateY(0); }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .error-msg {
      background: rgba(239,68,68,0.15);
      border: 1px solid rgba(239,68,68,0.4);
      color: #FCA5A5;
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }

    .recovery-link {
      text-align: center;
      margin-top: 16px;
    }

    .recovery-link a {
      color: var(--blue);
      font-size: 13px;
      text-decoration: none;
      font-weight: 600;
    }

    .recovery-link a:hover { text-decoration: underline; }

    .dev-credit {
      text-align: center;
      margin-top: 24px;
      color: rgba(255,255,255,0.25);
      font-size: 12px;
      font-weight: 500;
    }

    /* ---- APP LAYOUT ---- */
    #app-screen { display: none; min-height: 100vh; }

    .app-layout { display: flex; min-height: 100vh; }

    /* Sidebar */
    .sidebar {
      width: 260px;
      background: var(--navy);
      color: var(--white);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      position: fixed;
      top: 0;
      left: 0;
      height: 100vh;
      overflow-y: auto;
      z-index: 100;
      transition: transform 0.3s;
    }

    .sidebar-brand {
      padding: 24px 20px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .sidebar-brand-name {
      font-size: 18px;
      font-weight: 900;
      letter-spacing: 2px;
      margin-bottom: 4px;
    }

    .sidebar-brand-name span { color: var(--gold); }

    .sidebar-brand-tag {
      font-size: 10px;
      color: rgba(255,255,255,0.4);
      letter-spacing: 0.5px;
      font-weight: 500;
    }

    .sidebar-user {
      padding: 16px 20px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .sidebar-user-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--gold);
      color: var(--navy);
      font-weight: 800;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .sidebar-user-name {
      font-size: 14px;
      font-weight: 700;
    }

    .sidebar-user-role {
      font-size: 11px;
      color: var(--gold);
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    .sidebar-nav { flex: 1; padding: 12px 0; }

    .sidebar-section {
      padding: 8px 20px 4px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1.5px;
      color: rgba(255,255,255,0.3);
      text-transform: uppercase;
    }

    .sidebar-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 20px;
      cursor: pointer;
      border-radius: 0;
      font-size: 14px;
      font-weight: 500;
      color: rgba(255,255,255,0.65);
      transition: all 0.15s;
      text-decoration: none;
      border-left: 3px solid transparent;
    }

    .sidebar-item:hover {
      background: rgba(255,255,255,0.05);
      color: var(--white);
    }

    .sidebar-item.active {
      background: rgba(245,158,11,0.12);
      color: var(--gold);
      border-left-color: var(--gold);
      font-weight: 700;
    }

    .sidebar-item svg { flex-shrink: 0; }

    .sidebar-footer {
      padding: 16px 0;
      border-top: 1px solid rgba(255,255,255,0.08);
    }

    /* Main content */
    .main-content {
      margin-left: 260px;
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    .topbar {
      background: var(--white);
      padding: 0 32px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--slate-200);
      position: sticky;
      top: 0;
      z-index: 50;
    }

    .topbar-title {
      font-size: 20px;
      font-weight: 800;
      color: var(--navy);
    }

    .topbar-actions { display: flex; gap: 12px; align-items: center; }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 700;
    }

    .badge-gold { background: rgba(245,158,11,0.15); color: var(--gold-dark); }
    .badge-green { background: rgba(34,197,94,0.15); color: #16a34a; }
    .badge-blue { background: rgba(59,130,246,0.15); color: #1d4ed8; }
    .badge-red { background: rgba(239,68,68,0.15); color: #dc2626; }

    .page-content { padding: 32px; }

    /* ---- DASHBOARD ---- */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 32px;
    }

    .stat-card {
      background: var(--white);
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      border: 1px solid var(--slate-200);
      position: relative;
      overflow: hidden;
    }

    .stat-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
    }

    .stat-card.gold::before { background: var(--gold); }
    .stat-card.blue::before { background: var(--blue); }
    .stat-card.green::before { background: var(--green); }
    .stat-card.red::before { background: var(--red); }

    .stat-icon {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 16px;
      font-size: 22px;
    }

    .stat-icon.gold { background: rgba(245,158,11,0.12); }
    .stat-icon.blue { background: rgba(59,130,246,0.12); }
    .stat-icon.green { background: rgba(34,197,94,0.12); }
    .stat-icon.red { background: rgba(239,68,68,0.12); }

    .stat-label { font-size: 13px; color: var(--slate-500); font-weight: 600; margin-bottom: 8px; }
    .stat-value { font-size: 36px; font-weight: 800; line-height: 1; }

    /* Tables */
    .card {
      background: var(--white);
      border-radius: 16px;
      border: 1px solid var(--slate-200);
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      overflow: hidden;
    }

    .card-header {
      padding: 20px 24px;
      border-bottom: 1px solid var(--slate-200);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .card-title { font-size: 16px; font-weight: 800; color: var(--navy); }
    .card-subtitle { font-size: 13px; color: var(--slate-400); margin-top: 2px; }

    table { width: 100%; border-collapse: collapse; }

    th {
      background: var(--slate-100);
      padding: 12px 20px;
      text-align: left;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--slate-500);
    }

    td {
      padding: 16px 20px;
      border-top: 1px solid var(--slate-200);
      font-size: 14px;
      font-weight: 500;
    }

    tr:hover td { background: var(--slate-100); }

    .status-dot {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      font-weight: 600;
    }

    .status-dot::before {
      content: '';
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    .status-dot.active::before { background: var(--green); }
    .status-dot.inactive::before { background: var(--slate-400); }

    .progress-bar {
      height: 8px;
      background: var(--slate-200);
      border-radius: 10px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      border-radius: 10px;
      transition: width 0.6s ease;
    }

    /* Buttons */
    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 10px;
      font-family: 'Outfit', sans-serif;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .btn-sm { padding: 6px 14px; font-size: 12px; border-radius: 8px; }

    .btn-gold { background: var(--gold); color: var(--navy); }
    .btn-gold:hover { background: var(--gold-dark); transform: translateY(-1px); }

    .btn-outline {
      background: transparent;
      border: 1.5px solid var(--slate-200);
      color: var(--navy);
    }
    .btn-outline:hover { border-color: var(--navy); background: var(--slate-100); }

    .btn-danger { background: var(--red); color: white; }
    .btn-danger:hover { opacity: 0.85; }

    /* Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(4px);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }

    .modal-overlay.show { opacity: 1; pointer-events: all; }

    .modal {
      background: var(--white);
      border-radius: 20px;
      padding: 32px;
      width: 100%;
      max-width: 540px;
      box-shadow: 0 25px 60px rgba(0,0,0,0.25);
      transform: translateY(20px);
      transition: transform 0.2s;
    }

    .modal-overlay.show .modal { transform: translateY(0); }

    .modal-title {
      font-size: 20px;
      font-weight: 800;
      margin-bottom: 24px;
      color: var(--navy);
    }

    .modal-footer {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
      margin-top: 24px;
    }

    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

    .form-group-light { margin-bottom: 16px; }
    .form-label-light { display: block; font-size: 13px; font-weight: 600; color: var(--slate-500); margin-bottom: 6px; }
    .form-input-light {
      width: 100%;
      padding: 11px 14px;
      background: var(--slate-100);
      border: 1.5px solid var(--slate-200);
      border-radius: 10px;
      font-family: 'Outfit', sans-serif;
      font-size: 14px;
      color: var(--navy);
      outline: none;
      transition: all 0.2s;
    }
    .form-input-light:focus {
      border-color: var(--gold);
      background: var(--white);
      box-shadow: 0 0 0 3px rgba(245,158,11,0.12);
    }

    select.form-input-light { cursor: pointer; }

    /* Toast */
    .toast-container {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .toast {
      background: var(--navy);
      color: var(--white);
      padding: 14px 20px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      box-shadow: 0 8px 24px rgba(0,0,0,0.2);
      animation: slideIn 0.3s ease;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .toast.success { border-left: 4px solid var(--green); }
    .toast.error { border-left: 4px solid var(--red); }
    .toast.warning { border-left: 4px solid var(--gold); }

    @keyframes slideIn {
      from { transform: translateX(60px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    /* Loading */
    .spinner {
      width: 20px;
      height: 20px;
      border: 2.5px solid rgba(0,0,0,0.15);
      border-top-color: var(--navy);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      display: inline-block;
    }

    .spinner-gold {
      border-color: rgba(245,158,11,0.2);
      border-top-color: var(--gold);
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Compliance card */
    .compliance-grid {
      display: grid;
      gap: 16px;
    }

    .compliance-row {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .compliance-name {
      min-width: 180px;
      font-weight: 700;
      font-size: 14px;
    }

    .compliance-bar { flex: 1; }

    .compliance-pct {
      min-width: 48px;
      text-align: right;
      font-size: 14px;
      font-weight: 800;
    }

    /* Page tabs */
    .page { display: none; }
    .page.active { display: block; }

    /* Responsive */
    @media (max-width: 768px) {
      .sidebar { transform: translateX(-100%); }
      .sidebar.open { transform: translateX(0); }
      .main-content { margin-left: 0; }
      .stats-grid { grid-template-columns: 1fr 1fr; }
      .form-row { grid-template-columns: 1fr; }
    }

    .empty-state {
      padding: 48px;
      text-align: center;
      color: var(--slate-400);
    }
    .empty-state-icon { font-size: 48px; margin-bottom: 12px; }
    .empty-state-title { font-size: 16px; font-weight: 700; margin-bottom: 6px; }
  </style>
</head>
<body>

<!-- ===================== AUTH SCREEN ===================== -->
<div id="auth-screen">
  <div class="auth-card">
    <div class="brand-logo">
      <svg width="80" height="80" viewBox="0 0 100 100">
        <!-- Bar charts (gold) -->
        <rect x="34" y="40" width="8" height="14" rx="2" fill="#F59E0B"/>
        <rect x="45" y="32" width="8" height="22" rx="2" fill="#F59E0B"/>
        <rect x="56" y="23" width="8" height="31" rx="2" fill="#F59E0B"/>
        <!-- Cart body (navy) -->
        <path d="M18 35 L22 35 L29 52 L68 52 L74 32 L22 32 Z" fill="#0F172A"/>
        <circle cx="35" cy="60" r="5" fill="#0F172A"/>
        <circle cx="60" cy="60" r="5" fill="#0F172A"/>
        <!-- Road (gold) -->
        <path d="M50 75 Q76 62 72 28 Q78 18 84 22 Q90 46 66 77 Z" fill="#F59E0B"/>
        <circle cx="80" cy="16" r="7" fill="#F59E0B"/>
        <circle cx="80" cy="16" r="3" fill="white"/>
      </svg>
    </div>
    <div class="brand-logo" style="margin-top:-12px">
      <div class="brand-title">INTEGRA <span>TRADE</span></div>
      <div class="brand-tagline">Plataforma de Ejecución en Punto de Venta</div>
    </div>
    <div class="error-msg" id="login-error">Correo o contraseña incorrectos.</div>
    <form id="login-form" onsubmit="doLogin(event)">
      <div class="form-group">
        <label class="form-label">Correo Electrónico</label>
        <input type="email" class="form-input" id="login-email" placeholder="usuario@integratrade.com" value="admin@integratrade.com" required />
      </div>
      <div class="form-group">
        <label class="form-label">Contraseña</label>
        <input type="password" class="form-input" id="login-password" placeholder="••••••••" value="admin123" required />
      </div>
      <button type="submit" class="btn-primary" id="login-btn">INGRESAR AL SISTEMA</button>
    </form>
    <div class="recovery-link">
      <a href="#">¿Olvidaste tu contraseña?</a>
    </div>
    <div class="dev-credit">Desarrollado por IntegraBI · v1.0.0</div>
  </div>
</div>

<!-- ===================== APP SCREEN ===================== -->
<div id="app-screen">
  <div class="app-layout">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-brand">
        <div class="sidebar-brand-name">INTEGRA <span>TRADE</span></div>
        <div class="sidebar-brand-tag">Gestión de Mercaderistas · IntegraBI</div>
      </div>
      <div class="sidebar-user">
        <div class="sidebar-user-avatar" id="nav-avatar">--</div>
        <div>
          <div class="sidebar-user-name" id="nav-username">Cargando...</div>
          <div class="sidebar-user-role" id="nav-role">---</div>
        </div>
      </div>
      <nav class="sidebar-nav" id="sidebar-nav">
        <!-- Built dynamically by JS -->
      </nav>
      <div class="sidebar-footer">
        <div class="sidebar-item" onclick="doLogout()" style="color:rgba(255,100,100,0.8)">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          Cerrar Sesión
        </div>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <header class="topbar">
        <div class="topbar-title" id="topbar-title">Dashboard</div>
        <div class="topbar-actions" id="topbar-actions"></div>
      </header>
      <div class="page-content">
        <!-- Pages rendered here -->
        <div class="page active" id="page-dashboard"></div>
        <div class="page" id="page-merchandisers"></div>
        <div class="page" id="page-customers"></div>
        <div class="page" id="page-articles"></div>
        <div class="page" id="page-routes"></div>
        <div class="page" id="page-visits"></div>
      </div>
    </main>
  </div>
</div>

<!-- Toast container -->
<div class="toast-container" id="toasts"></div>

<!-- Modals -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal" id="modal-box">
    <div class="modal-title" id="modal-title">Modal</div>
    <div id="modal-body"></div>
    <div class="modal-footer" id="modal-footer"></div>
  </div>
</div>

<script>
const API = '/api';
let authToken = localStorage.getItem('integra_token');
let currentUser = JSON.parse(localStorage.getItem('integra_user') || 'null');
let currentPage = 'dashboard';

// ============ AUTH ============
async function doLogin(e) {
  e.preventDefault();
  const btn = document.getElementById('login-btn');
  const errEl = document.getElementById('login-error');
  errEl.style.display = 'none';
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner spinner-gold"></span> Ingresando...';

  try {
    const r = await fetch(`${API}/auth/login`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        email: document.getElementById('login-email').value,
        password: document.getElementById('login-password').value
      })
    });
    const data = await r.json();
    if (!r.ok) throw new Error(data.error || 'Error');
    authToken = data.token;
    currentUser = data.user;
    localStorage.setItem('integra_token', authToken);
    localStorage.setItem('integra_user', JSON.stringify(currentUser));
    initApp();
  } catch (err) {
    errEl.textContent = err.message;
    errEl.style.display = 'block';
  } finally {
    btn.disabled = false;
    btn.innerHTML = 'INGRESAR AL SISTEMA';
  }
}

function doLogout() {
  authToken = null; currentUser = null;
  localStorage.removeItem('integra_token');
  localStorage.removeItem('integra_user');
  document.getElementById('auth-screen').style.display = 'flex';
  document.getElementById('app-screen').style.display = 'none';
}

async function apiFetch(path, opts={}) {
  const r = await fetch(`${API}${path}`, {
    ...opts,
    headers: {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${authToken}`,
      ...(opts.headers||{})
    }
  });
  if (!r.ok) {
    const err = await r.json().catch(()=>({error:'Error del servidor'}));
    throw new Error(err.error || 'Error');
  }
  return r.json();
}

// ============ APP INIT ============
function initApp() {
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('app-screen').style.display = 'block';

  const initials = currentUser.name.split(' ').slice(0,2).map(w=>w[0]).join('');
  document.getElementById('nav-avatar').textContent = initials;
  document.getElementById('nav-username').textContent = currentUser.name;
  document.getElementById('nav-role').textContent = currentUser.role === 'ADMIN' ? 'Administrador' : 'Mercaderista';

  buildNav();
  navigateTo('dashboard');
}

const NAV_ADMIN = [
  { id:'dashboard', label:'Dashboard', icon:'📊' },
  { id:'merchandisers', label:'Mercaderistas', icon:'👥' },
  { id:'customers', label:'Clientes', icon:'🏪' },
  { id:'articles', label:'Artículos', icon:'📦' },
  { id:'routes', label:'Rutas', icon:'🗺️' },
  { id:'visits', label:'Visitas', icon:'📋' },
];

const NAV_MERC = [
  { id:'dashboard', label:'Mi Panel', icon:'🏠' },
  { id:'visits', label:'Mis Visitas', icon:'📋' },
];

function buildNav() {
  const nav = document.getElementById('sidebar-nav');
  const items = currentUser.role === 'ADMIN' ? NAV_ADMIN : NAV_MERC;
  nav.innerHTML = items.map(i => `
    <a class="sidebar-item" id="nav-${i.id}" onclick="navigateTo('${i.id}')">
      <span>${i.icon}</span> ${i.label}
    </a>
  `).join('');
}

function navigateTo(page) {
  currentPage = page;
  document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
  const navEl = document.getElementById(`nav-${page}`);
  const pageEl = document.getElementById(`page-${page}`);
  if (navEl) navEl.classList.add('active');
  if (pageEl) { pageEl.classList.add('active'); loadPage(page); }
  const titles = {dashboard:'Dashboard',merchandisers:'Gestión de Mercaderistas',customers:'Gestión de Clientes',articles:'Gestión de Artículos',routes:'Gestión de Rutas',visits:'Registro de Visitas'};
  document.getElementById('topbar-title').textContent = titles[page] || page;
  document.getElementById('topbar-actions').innerHTML = '';
}

async function loadPage(page) {
  const el = document.getElementById(`page-${page}`);
  el.innerHTML = `<div class="empty-state"><div class="spinner" style="width:36px;height:36px;border-top-color:var(--gold);margin:0 auto 16px"></div><div>Cargando...</div></div>`;
  try {
    switch(page) {
      case 'dashboard': await renderDashboard(el); break;
      case 'merchandisers': await renderMerchandisers(el); break;
      case 'customers': await renderCustomers(el); break;
      case 'articles': await renderArticles(el); break;
      case 'routes': await renderRoutes(el); break;
      case 'visits': await renderVisits(el); break;
    }
  } catch(err) {
    el.innerHTML = `<div class="card" style="padding:32px;text-align:center;color:var(--red)">❌ Error cargando: ${err.message}<br><br><button class="btn btn-gold" onclick="loadPage('${page}')">Reintentar</button></div>`;
  }
}

      <div class="form-group-light"><label class="form-label-light">Categoría</label><input id="a-category" class="form-input-light" value="${a.category}" /></div>
    </div>
    <div class="form-group-light"><label class="form-label-light">Precio Sugerido (COP)</label><input id="a-price" class="form-input-light" type="number" step="any" value="${a.suggestedPrice}" /></div>
  `;
  document.getElementById('modal-footer').innerHTML = `<button class="btn btn-outline" onclick="closeModal()">Cancelar</button><button class="btn btn-gold" onclick="updateArticle('${a.id}')">Actualizar</button>`;
  showModal();
}

async function saveArticle() {
  try {
    const body = { code:document.getElementById('a-code').value, name:document.getElementById('a-name').value, brand:document.getElementById('a-brand').value, category:document.getElementById('a-category').value, suggestedPrice:parseFloat(document.getElementById('a-price').value) };
    await apiFetch('/articles', {method:'POST', body: JSON.stringify(body)});
    closeModal(); toast('Artículo creado exitosamente','success'); loadPage('articles');
  } catch(e) { toast(e.message,'error'); }
}

async function updateArticle(id) {
  try {
    const body = { code:document.getElementById('a-code').value, name:document.getElementById('a-name').value, brand:document.getElementById('a-brand').value, category:document.getElementById('a-category').value, suggestedPrice:parseFloat(document.getElementById('a-price').value) };
    await apiFetch(`/articles/${id}`, {method:'PUT', body: JSON.stringify(body)});
    closeModal(); toast('Artículo actualizado','success'); loadPage('articles');
  } catch(e) { toast(e.message,'error'); }
}

async function toggleArticle(id, name, isActive) {
  if (!confirm(`¿${isActive?'Inactivar':'Activar'} "${name}"?`)) return;
  try {
    await apiFetch(`/articles/${id}/toggle-state`, {method:'PATCH'});
    toast(`Artículo ${isActive?'inactivado':'activado'}`, 'success'); loadPage('articles');
  } catch(e) { toast(e.message,'error'); }
}

// ============ ROUTES ============
async function renderRoutes(el) {
  const data = await apiFetch('/routes');
  if (currentUser.role === 'ADMIN') {
    document.getElementById('topbar-actions').innerHTML = `
      <button class="btn btn-gold" onclick="openCreateRoute()">+ Nueva Ruta</button>`;
  } else {
    document.getElementById('topbar-actions').innerHTML = '';
  }
  
  el.innerHTML = `
    <div class="card">
      <div class="card-header"><div><div class="card-title">🗺️ Rutas Configuradas</div><div class="card-subtitle">${data.length} rutas activas</div></div></div>
      ${data.length === 0 ? `<div class="empty-state"><div class="empty-state-icon">🗺️</div><div class="empty-state-title">Sin rutas configuradas</div><div style="margin-top:12px;font-size:13px;color:var(--slate-400)">Crea rutas desde la API o el seeder.</div></div>` :
      data.map(r => `
        <div style="padding:20px 24px;border-bottom:1px solid var(--slate-200)">
          <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px">
            <span style="font-size:18px">🗺️</span>
            <div>
              <div style="font-size:16px;font-weight:800">${r.name}</div>
              <div style="font-size:13px;color:var(--slate-400)">Mercaderista: <strong style="color:var(--navy)">${r.merchandiserName}</strong></div>
            </div>
            <div style="margin-left:auto; display:flex; gap:8px; align-items:center;">
              <span class="badge badge-blue">${r.customers.length} cliente${r.customers.length!==1?'s':''}</span>
              ${currentUser.role === 'ADMIN' ? `
                <button class="btn btn-outline btn-sm" onclick="openEditRoute(${JSON.stringify(r).replace(/"/g,'&quot;')})">Editar</button>
                <button class="btn btn-sm" style="background:rgba(239,68,68,0.12); color:var(--red)" onclick="deleteRoute('${r.id}','${r.name}')">Eliminar</button>
              ` : ''}
            </div>
          </div>
          <div style="display:flex;flex-wrap:wrap;gap:8px">
            ${r.customers.map(c => `
              <div style="background:var(--slate-100);border:1px solid var(--slate-200);border-radius:10px;padding:8px 14px;font-size:13px">
                <strong>${c.order}.</strong> ${c.name}
                <span style="color:var(--slate-400);font-size:11px;margin-left:6px">[${c.visitDays ? c.visitDays.join(', ') : ''}]</span>
              </div>
            `).join('')}
          </div>
        </div>
      `).join('')}
    </div>
  `;
}

let routeFormCustomers = [];
let allMerchandisers = [];
let allCustomers = [];

async function openCreateRoute() {
  document.getElementById('modal-title').textContent = '+ Crear Ruta';
  
  try {
    const merchandisers = await apiFetch('/users/merchandisers');
    const customers = await apiFetch('/customers');
    
    allMerchandisers = merchandisers.filter(m => m.isActive);
    allCustomers = customers.filter(c => c.isActive);
    routeFormCustomers = [];
    
    renderRouteFormModalBody();
    
    document.getElementById('modal-footer').innerHTML = `
      <button class="btn btn-outline" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-gold" onclick="saveRoute()">Guardar Ruta</button>
    `;
    showModal();
  } catch (e) {
    toast('Error al cargar datos: ' + e.message, 'error');
  }
}

async function openEditRoute(r) {
  document.getElementById('modal-title').textContent = `✏️ Editar Ruta: ${r.name}`;
  
  try {
    const merchandisers = await apiFetch('/users/merchandisers');
    const customers = await apiFetch('/customers');
    
    allMerchandisers = merchandisers.filter(m => m.isActive || m.id === r.merchandiserId);
    allCustomers = customers.filter(c => c.isActive || r.customers.some(rc => rc.id === c.id));
    
    routeFormCustomers = r.customers.map(rc => ({
      customerId: rc.id,
      order: rc.order,
      visitDays: [...rc.visitDays]
    }));
    
    renderRouteFormModalBody(r);
    
    document.getElementById('modal-footer').innerHTML = `
      <button class="btn btn-outline" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-gold" onclick="saveRoute('${r.id}')">Actualizar Ruta</button>
    `;
    showModal();
  } catch (e) {
    toast('Error al cargar datos: ' + e.message, 'error');
  }
}

function renderRouteFormModalBody(routeData = null) {
  const nameVal = routeData ? routeData.name : '';
  const merchVal = routeData ? routeData.merchandiserId : '';
  
  let html = `
    <div class="form-group-light">
      <label class="form-label-light">Nombre de la Ruta *</label>
      <input id="route-name" class="form-input-light" value="${nameVal}" placeholder="Ej. Ruta Centro - Bogotá" />
    </div>
    
    <div class="form-group-light">
      <label class="form-label-light">Mercaderista Asignado *</label>
      <select id="route-merchandiser" class="form-input-light">
        <option value="">-- Seleccionar Mercaderista --</option>
        ${allMerchandisers.map(m => `
          <option value="${m.id}" ${m.id === merchVal ? 'selected' : ''}>${m.name}</option>
        `).join('')}
      </select>
    </div>
    
    <div style="margin-top: 24px; margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between;">
      <span style="font-weight: 800; font-size: 14px; color: var(--navy);">🏪 Clientes Asignados a la Ruta</span>
      <button class="btn btn-outline btn-sm" onclick="addCustomerToRouteForm()">+ Agregar Cliente</button>
    </div>
    
    <div id="route-customers-container" style="max-height: 250px; overflow-y: auto; border: 1px solid var(--slate-200); border-radius: 10px; padding: 12px; background: var(--slate-100);">
      <!-- Rendered dynamically -->
    </div>
  `;
  
  document.getElementById('modal-body').innerHTML = html;
  renderRouteFormCustomersList();
}

function renderRouteFormCustomersList() {
  const container = document.getElementById('route-customers-container');
  if (routeFormCustomers.length === 0) {
    container.innerHTML = `
      <div style="text-align: center; padding: 24px; color: var(--slate-400); font-size: 13px;">
        No hay clientes asignados a esta ruta. Haz clic en "+ Agregar Cliente" para añadir uno.
      </div>
    `;
    return;
  }
  
  const weekdays = ['Lunes', 'Martes', 'Miércoles', 'Jueves', 'Viernes', 'Sábado', 'Domingo'];
  
  let html = '';
  routeFormCustomers.forEach((rc, index) => {
    html += `
      <div style="background: var(--white); border: 1px solid var(--slate-200); border-radius: 10px; padding: 14px; margin-bottom: 12px; position: relative;">
        <button onclick="removeCustomerFromRouteForm(${index})" style="position: absolute; top: 12px; right: 12px; background: none; border: none; color: var(--red); font-weight: 800; cursor: pointer; font-size: 16px;" title="Eliminar cliente de la ruta">✕</button>
        
        <div class="form-row" style="margin-bottom: 8px; padding-right: 20px;">
          <div class="form-group-light" style="margin-bottom: 0;">
            <label class="form-label-light">Cliente</label>
            <select class="form-input-light" onchange="updateRouteFormCustomer(${index}, 'customerId', this.value)">
              <option value="">-- Seleccionar --</option>
              ${allCustomers.map(c => `
                <option value="${c.id}" ${c.id === rc.customerId ? 'selected' : ''}>${c.name} (${c.code})</option>
              `).join('')}
            </select>
          </div>
          <div class="form-group-light" style="margin-bottom: 0;">
            <label class="form-label-light">Secuencia / Orden</label>
            <input type="number" class="form-input-light" value="${rc.order}" min="1" onchange="updateRouteFormCustomer(${index}, 'order', this.value)" />
          </div>
        </div>
        
        <div style="margin-top: 8px;">
          <label class="form-label-light">Días de Visita</label>
          <div style="display: flex; flex-wrap: wrap; gap: 8px; margin-top: 4px;">
            ${weekdays.map(day => {
              const checked = rc.visitDays.includes(day) ? 'checked' : '';
              return `
                <label style="display: inline-flex; align-items: center; gap: 4px; font-size: 12px; font-weight: 600; cursor: pointer; background: var(--slate-100); padding: 4px 8px; border-radius: 6px; border: 1px solid var(--slate-200);">
                  <input type="checkbox" ${checked} onchange="toggleRouteFormCustomerDay(${index}, '${day}', this.checked)" />
                  ${day.substring(0, 3)}
                </label>
              `;
            }).join('')}
          </div>
        </div>
      </div>
    `;
  });
  
  container.innerHTML = html;
}

function addCustomerToRouteForm() {
  const nextOrder = routeFormCustomers.length > 0 
    ? Math.max(...routeFormCustomers.map(rc => parseInt(rc.order) || 0)) + 1 
    : 1;
    
  routeFormCustomers.push({
    customerId: '',
    order: nextOrder,
    visitDays: ['Lunes']
  });
  renderRouteFormCustomersList();
}

function removeCustomerFromRouteForm(index) {
  routeFormCustomers.splice(index, 1);
  renderRouteFormCustomersList();
}

function updateRouteFormCustomer(index, field, value) {
  if (field === 'order') {
    routeFormCustomers[index][field] = parseInt(value) || 1;
  } else {
    routeFormCustomers[index][field] = value;
  }
}

function toggleRouteFormCustomerDay(index, day, isChecked) {
  const days = routeFormCustomers[index].visitDays;
  if (isChecked) {
    if (!days.includes(day)) {
      days.push(day);
    }
  } else {
    const dayIndex = days.indexOf(day);
    if (dayIndex > -1) {
      days.splice(dayIndex, 1);
    }
  }
}

async function saveRoute(routeId = null) {
  const name = document.getElementById('route-name').value.trim();
  const merchandiserId = document.getElementById('route-merchandiser').value;
  
  if (!name) {
    toast('Por favor, ingresa el nombre de la ruta', 'warning');
    return;
  }
  
  if (!merchandiserId) {
    toast('Por favor, selecciona un mercaderista', 'warning');
    return;
  }
  
  if (routeFormCustomers.length === 0) {
    toast('Por favor, agrega al menos un cliente a la ruta', 'warning');
    return;
  }
  
  for (let i = 0; i < routeFormCustomers.length; i++) {
    const rc = routeFormCustomers[i];
    if (!rc.customerId) {
      toast(`Por favor, selecciona el cliente en la fila ${i + 1}`, 'warning');
      return;
    }
    if (rc.visitDays.length === 0) {
      toast(`Por favor, selecciona al menos un día de visita para el cliente en la fila ${i + 1}`, 'warning');
      return;
    }
  }
  
  const body = {
    name,
    merchandiserId,
    customers: routeFormCustomers
  };
  
  try {
    if (routeId) {
      await apiFetch(`/routes/${routeId}`, {
        method: 'PUT',
        body: JSON.stringify(body)
      });
      toast('Ruta actualizada exitosamente', 'success');
    } else {
      await apiFetch('/routes', {
        method: 'POST',
        body: JSON.stringify(body)
      });
      toast('Ruta creada exitosamente', 'success');
    }
    closeModal();
    loadPage('routes');
  } catch (e) {
    toast(e.message, 'error');
  }
}

async function deleteRoute(id, name) {
  if (!confirm(`¿Estás seguro de que deseas eliminar la ruta "${name}"?`)) return;
  try {
    await apiFetch(`/routes/${id}`, {
      method: 'DELETE'
    });
    toast('Ruta eliminada correctamente', 'success');
    loadPage('routes');
  } catch (e) {
    toast(e.message, 'error');
  }
}

// ============ VISITS ============
async function renderVisits(el) {
  const data = await apiFetch('/visits');
  document.getElementById('topbar-actions').innerHTML = '';
  el.innerHTML = `
    <div class="card">
      <div class="card-header"><div><div class="card-title">📋 Historial de Visitas</div><div class="card-subtitle">${data.length} visitas registradas</div></div></div>
      ${data.length === 0 ? `<div class="empty-state"><div class="empty-state-icon">📋</div><div class="empty-state-title">Sin visitas registradas</div><div style="margin-top:8px;font-size:13px;color:var(--slate-400)">Las visitas aparecerán aquí una vez los mercaderistas las sincronicen desde la app móvil.</div></div>` :
      `<table>
        <thead><tr><th>Cliente</th><th>Mercaderista</th><th>Inicio</th><th>Fin</th><th>Duración</th><th>GPS</th><th>Estado</th></tr></thead>
        <tbody>
          ${data.map(v => {
            const start = new Date(v.startTime);
            const end = v.endTime ? new Date(v.endTime) : null;
            const duration = end ? Math.round((end-start)/60000) + ' min' : 'En curso';
            return `<tr>
              <td><strong>${v.customer?.name||'—'}</strong><br><span style="font-size:11px;color:var(--slate-400)">${v.customer?.code||''}</span></td>
              <td>${v.merchandiser?.user?.name||'—'}</td>
              <td style="font-size:13px">${start.toLocaleDateString('es-CO')} ${start.toLocaleTimeString('es-CO',{hour:'2-digit',minute:'2-digit'})}</td>
              <td style="font-size:13px">${end ? end.toLocaleTimeString('es-CO',{hour:'2-digit',minute:'2-digit'}) : '—'}</td>
              <td><span class="badge ${end?'badge-green':'badge-gold'}">${duration}</span></td>
              <td style="font-size:12px;color:var(--slate-400)">${v.startLatitude.toFixed(4)}, ${v.startLongitude.toFixed(4)}</td>
              <td><span class="badge ${v.isSynced?'badge-green':'badge-gold'}">${v.isSynced?'✅ Sincronizado':'⏳ Pendiente'}</span></td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>`}
    </div>
  `;
}

// ============ MODALS ============
function showModal() {
  document.getElementById('modal-overlay').classList.add('show');
}
function closeModal(e) {
  if (e && e.target !== document.getElementById('modal-overlay')) return;
  document.getElementById('modal-overlay').classList.remove('show');
}

// ============ TOAST ============
function toast(msg, type='success') {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  const icons = {success:'✅', error:'❌', warning:'⚠️'};
  el.innerHTML = `<span>${icons[type]||'ℹ️'}</span> ${msg}`;
  document.getElementById('toasts').appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

// ============ STARTUP ============
window.addEventListener('DOMContentLoaded', () => {
  if (authToken && currentUser) {
    initApp();
  }
});
</script>
